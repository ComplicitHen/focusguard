name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Build debug APK (no signing needed)
        run: gradle assembleDebug
        working-directory: .

      - name: Decode keystore (release only)
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > focusguard.jks

      - name: Build release APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/focusguard.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focusguard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusguard-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
